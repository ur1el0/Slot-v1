{% extends 'slot/base.html' %}
{% block title %}Login | Appointment Booking{% endblock %}
{% block content %}
<h2>Login</h2>
<form method="post">
    {% csrf_token %}
    {{ form.non_field_errors }}
    {% for field in form %}
        <p>
            <label for="{{ field.id_for_label }}">{{ field.label }}</label><br>
            {{ field }}<br>
            {{ field.errors }}
        </p>
    {% endfor %}
    <button type="submit">Login</button>
</form>
{% endblock %}
